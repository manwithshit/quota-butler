# Quota Butler config example.
# Copy to ~/.quota-butler/config.yaml and edit locally.
# PyYAML is optional; the built-in fallback supports this simple shape.

# launchd polling interval in minutes.
interval_min: 15

# Warm-up prompt. Keep it short.
warmup_prompt: say hi

# Directory for per-plan LaunchAgent plist files.
plan_tasks_dir: ~/.quota-butler/plan-tasks

# Debug switch: true means detect only, without sending messages.
muted: false

# Quiet hours for non-urgent reminders.
quiet_hours:
  start: "23:00"
  end: "08:00"

# Runtime state path.
state_path: ~/.quota-butler/state.json

# Feishu/Lark message target.
# Usually leave these empty and let the first private bot chat bind itself.
feishu:
  chat_id: ""
  user_id: ""
